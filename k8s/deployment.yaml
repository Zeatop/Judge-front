apiVersion: apps/v1
kind: Deployment
metadata:
  name: judge-front
  labels:
    app: judge-front
spec:
  replicas: 2
  selector:
    matchLabels:
      app: judge-front
  template:
    metadata:
      labels:
        app: judge-front
    spec:
      containers:
        - name: judge-front
          image: 10.0.0.10:5000/judge-front:latest
          ports:
            - containerPort: 81
---
apiVersion: v1
kind: Service
metadata:
  name: judge-front
spec:
  type: NodePort
  selector:
    app: judge-front
  ports:
    - port: 81
      targetPort: 81
      nodePort: 30090